<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#14161d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07080a;stop-opacity:1" />
    </radialGradient>
    
    <!-- Luxury Gold Gradient - Brighter and High Contrast -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFDE6;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FFDF70;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#E5B22D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A87A1E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Neon Green Glow Filter -->
    <filter id="green-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Matte Black Background with rounded corner -->
  <rect width="512" height="512" rx="100" fill="url(#bg-glow)" />
  
  <!-- Outer Gold Border -->
  <rect x="12" y="12" width="488" height="488" rx="88" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.15" />

  <!-- Large Geometric Golden 'V' - Thicker & Sharper for Favicon legibility -->
  <g transform="translate(0, -10)">
    <!-- Thin elegant outer lines of V -->
    <path d="M136 120 L256 380 L376 120" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Main geometric solid/thick V shapes -->
    <path d="M140 120 L256 370 L372 120" fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Inner thin lines of V -->
    <path d="M176 120 L256 295 L336 120" fill="none" stroke="url(#gold)" stroke-width="5" opacity="0.75" stroke-linecap="round" />
  </g>

  <!-- 'vLAN Software' Typography -->
  <text x="256" y="420" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="600" font-size="38" fill="url(#gold)" text-anchor="middle" letter-spacing="1">
    <tspan fill="#FFFDE6" font-weight="300">v</tspan>LAN
  </text>
  <text x="256" y="455" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="450" font-size="20" fill="url(#gold)" text-anchor="middle" letter-spacing="4" opacity="0.8">
    SOFTWARE
  </text>
  
  <!-- Glowing green live status dot at bottom right -->
  <circle cx="420" cy="420" r="14" fill="#39D353" filter="url(#green-glow)" />
</svg>
