<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vLAN-CameraHIK Player</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        video-stream {
            flex: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<script type="module" src="http://127.0.0.1:1984/video-stream.js"></script>
<script type="module">
    const params = new URLSearchParams(location.search);
    const srcName = params.get('src');
    const mode = params.get('mode') || 'mse';
    const isMuted = params.get('muted') === 'true';

    const video = document.createElement('video-stream');
    video.mode = mode;
    // Connect directly to the go2rtc WebSocket server using the loopback address or window hostname
    const host = window.location.hostname || '127.0.0.1';
    video.src = `ws://${host}:1984/api/ws?src=${encodeURIComponent(srcName)}`;
    
    // Periodically check and apply properties to the inner HTML5 video element
    const interval = setInterval(() => {
        if (video.video) {
            video.video.muted = isMuted;
            video.video.controls = false;
            video.video.playsInline = true;
            video.video.style.objectFit = 'fill';
            
            // Try to autoplay
            video.video.play().catch(err => {
                console.warn('[Player] Autoplay prevented, retrying muted...', err.message);
                video.video.muted = true;
                video.video.play().catch(e => console.error('[Player] Play failed:', e));
            });
            
            clearInterval(interval);
        }
    }, 100);

    document.body.appendChild(video);
</script>
</body>
</html>
